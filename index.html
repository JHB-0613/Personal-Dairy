<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커스텀 폴더 일기장</title>
    <style>
        :root { --primary-color: #4a90e2; --bg-color: #f5f7fa; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 700px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        
        /* 폴더 스타일 카테고리 탭 */
        .category-container { margin-bottom: 30px; }
        .category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; margin-top: 10px; }
        .folder { background: #eee; padding: 18px 10px; border-radius: 10px; cursor: pointer; text-align: center; position: relative; transition: 0.2s; font-size: 14px; word-break: break-all; }
        .folder:hover { background: #e0e0e0; transform: translateY(-3px); }
        .folder.active { background: var(--primary-color); color: white; }
        .folder-count { position: absolute; top: 5px; left: 8px; font-size: 10px; opacity: 0.7; }
        .del-cat { position: absolute; top: 2px; right: 5px; font-size: 14px; color: #ff7675; display: none; }
        .folder:hover .del-cat { display: block; }

        /* 카테고리 추가 영역 */
        .add-category-box { display: flex; gap: 5px; margin-bottom: 15px; }
        .add-category-box input { margin-top: 0; flex: 1; padding: 8px; }
        .add-category-box button { width: auto; padding: 8px 15px; margin-top: 0; background: #2ecc71; }

        input, textarea, button, select { width: 100%; padding: 12px; margin-top: 8px; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background-color: var(--primary-color); color: white; border: none; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { opacity: 0.9; }
        .google-btn { background-color: #df4a32; margin-top: 15px; }
        
        /* 일기 아이템 스타일 */
        .diary-item { border-bottom: 1px solid #eee; padding: 15px 0; cursor: pointer; }
        .diary-item:hover { background: #fafafa; }
        .diary-header { display: flex; justify-content: space-between; align-items: center; }
        .diary-badge { background: #eee; padding: 2px 8px; border-radius: 10px; font-size: 11px; color: #666; }
        .diary-date { font-weight: bold; font-size: 14px; color: var(--primary-color); }
        
        .diary-preview { color: #666; font-size: 14px; margin-top: 5px; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; }
        .diary-full { display: none; white-space: pre-wrap; line-height: 1.6; margin-top: 15px; padding: 15px; background: #f9f9f9; border-radius: 8px; }
        .diary-item.open .diary-full { display: block; }
        .diary-item.open .diary-preview { display: none; }
        
        .user-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px; background: #eee; border-radius: 8px; }
        .logout-btn { background-color: #e74c3c; width: auto; padding: 5px 10px; font-size: 12px; }
        #auth-error { color: #e74c3c; font-size: 13px; margin-top: 10px; text-align: center; }
        textarea { resize: none; min-height: 100px; overflow-y: hidden; }
        .edit-textarea { min-height: 80px; margin-bottom: 10px; margin-top: 10px; }
        .edit-select { margin-top: 0; padding: 8px; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔒 비밀 폴더 일기장</h1>

    <div id="auth-section">
        <div id="login-form">
            <h3 style="text-align: center;">로그인</h3>
            <input type="text" id="login-id" placeholder="아이디">
            <input type="password" id="login-pw" placeholder="비밀번호">
            <button onclick="signInWithId()">로그인</button>
            <div style="text-align:center; margin-top:15px; font-size:14px; color:#666; cursor:pointer;" onclick="toggleAuth(true)">계정이 없으신가요? 회원가입</div>
        </div>

        <div id="signup-form" class="hidden">
            <h3 style="text-align: center;">회원가입</h3>
            <input type="text" id="signup-nickname" placeholder="닉네임">
            <input type="text" id="signup-id" placeholder="사용할 아이디">
            <input type="email" id="signup-email" placeholder="이메일">
            <input type="password" id="signup-pw" placeholder="비밀번호">
            <input type="password" id="signup-pw-confirm" placeholder="비밀번호 확인">
            <button style="background-color: #2ecc71;" onclick="signUpWithIdAndEmail()">가입하기</button>
            <div style="text-align:center; margin-top:15px; font-size:14px; color:#666; cursor:pointer;" onclick="toggleAuth(false)">이미 계정이 있나요? 로그인</div>
        </div>
        
        <p id="auth-error"></p>
        <div style="text-align: center; margin: 15px 0; color: #888;">또는</div>
        <button class="google-btn" onclick="loginWithGoogle()">구글로 계속하기</button>
    </div>

    <div id="main-section" class="hidden">
        <div class="user-info">
            <span id="user-name"></span>님 환영합니다!
            <button class="logout-btn" onclick="logout()">로그아웃</button>
        </div>

        <div class="category-container">
            <div class="add-category-box">
                <input type="text" id="new-cat-input" placeholder="새 폴더 이름">
                <button onclick="addCategory()">폴더 추가</button>
            </div>
            <div class="category-grid" id="folder-grid"></div>
        </div>

        <hr>

        <h3>✍️ 일기 작성</h3>
        <select id="category-select">
            <option value="미분류">폴더 선택</option>
        </select>
        <input type="date" id="date-input">
        <textarea id="content-input" placeholder="내용을 입력하세요..."></textarea>
        <button id="save-btn" onclick="saveDiary()">기록하기</button>

        <hr style="margin: 30px 0; border: 0.5px solid #eee;">
        <div id="diary-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, push, onValue, get, child, set, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCTChi4-r43pV9MkgXat6WJjyWqJaElMIM",
        authDomain: "personal-dairy-ec00f.firebaseapp.com",
        databaseURL: "https://personal-dairy-ec00f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "personal-dairy-ec00f",
        storageBucket: "personal-dairy-ec00f.firebasestorage.app",
        messagingSenderId: "261757215946",
        appId: "1:261757215946:web:d1af5573d78b2470450033"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    let allDiaries = {};
    let userCategories = [];
    let currentFilter = "전체";

    const autoResize = (textarea) => {
        textarea.style.height = 'auto';
        textarea.style.height = textarea.scrollHeight + 'px';
    };

    const contentInput = document.getElementById('content-input');
    contentInput.addEventListener('input', () => autoResize(contentInput));

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-section').classList.remove('hidden');
            document.getElementById('user-name').innerText = user.displayName || user.email;
            loadUserData(user.uid);
        } else {
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('main-section').classList.add('hidden');
        }
    });

    function loadUserData(uid) {
        onValue(ref(db, `users/${uid}/categories`), (snapshot) => {
            userCategories = snapshot.val() ? Object.entries(snapshot.val()) : [];
            renderUI();
        });
        onValue(ref(db, `users/${uid}/diaries`), (snapshot) => {
            allDiaries = snapshot.val() || {};
            renderUI();
        });
    }

    window.addCategory = async () => {
        const name = document.getElementById('new-cat-input').value.trim();
        if(!name) return;
        if(userCategories.some(c => c[1].name === name)) return alert("이미 존재하는 폴더입니다.");
        await push(ref(db, `users/${auth.currentUser.uid}/categories`), { name });
        document.getElementById('new-cat-input').value = '';
    };

    window.deleteCategory = async (catId, name) => {
        event.stopPropagation();
        if(!confirm(`'${name}' 폴더를 삭제할까요? (안의 일기는 삭제되지 않습니다.)`)) return;
        await remove(ref(db, `users/${auth.currentUser.uid}/categories/${catId}`));
        if(currentFilter === name) currentFilter = "전체";
    };

    window.saveDiary = async () => {
        const cat = document.getElementById('category-select').value;
        const date = document.getElementById('date-input').value;
        const content = contentInput.value;
        if(!content) return;

        await push(ref(db, `users/${auth.currentUser.uid}/diaries`), {
            category: cat,
            date: date,
            content: content,
            timestamp: Date.now()
        });
        contentInput.value = '';
        contentInput.style.height = 'auto';
    };

    function renderUI() {
        renderFolders();
        renderList();
        updateSelect();
    }

    function renderFolders() {
        const grid = document.getElementById('folder-grid');
        grid.innerHTML = `<div class="folder ${currentFilter === '전체' ? 'active' : ''}" onclick="setFilter('전체')">
            <span class="folder-count">${Object.keys(allDiaries).length}</span>전체</div>`;
        
        userCategories.forEach(([id, cat]) => {
            const count = Object.values(allDiaries).filter(d => d.category === cat.name).length;
            const folder = document.createElement('div');
            folder.className = `folder ${currentFilter === cat.name ? 'active' : ''}`;
            folder.onclick = () => setFilter(cat.name);
            folder.innerHTML = `
                <span class="folder-count">${count}</span>
                ${cat.name}
                <span class="del-cat" onclick="deleteCategory('${id}', '${cat.name}')">×</span>
            `;
            grid.appendChild(folder);
        });
    }

    function updateSelect() {
        const select = document.getElementById('category-select');
        select.innerHTML = '<option value="미분류">폴더 선택</option>';
        userCategories.forEach(([id, cat]) => {
            const opt = document.createElement('option');
            opt.value = cat.name;
            opt.innerText = cat.name;
            select.appendChild(opt);
        });
    }

    window.setFilter = (cat) => { currentFilter = cat; renderUI(); };

    function renderList() {
        const list = document.getElementById('diary-list');
        list.innerHTML = '';
        let entries = Object.entries(allDiaries);
        if(currentFilter !== "전체") entries = entries.filter(([id, d]) => d.category === currentFilter);

        entries.sort((a, b) => b[1].timestamp - a[1].timestamp).forEach(([id, d]) => {
            const item = document.createElement('div');
            item.className = 'diary-item';
            item.onclick = () => item.classList.toggle('open');
            const safeContent = d.content.replace(/`/g, '\\`').replace(/\$/g, '\\$');
            const currentCat = d.category || '미분류';
            
            item.innerHTML = `
                <div class="diary-header">
                    <span class="diary-date">${d.date}</span>
                    <span class="diary-badge">${currentCat}</span>
                </div>
                <div class="diary-preview">${d.content}</div>
                <div class="diary-full">
                    <div id="text-container-${id}">
                        <div>${d.content}</div>
                        <div style="text-align:right; margin-top:15px; display:flex; gap:5px; justify-content: flex-end;">
                            <button onclick="startEdit('${id}', \`${safeContent}\`, '${currentCat}')" style="background:#f1c40f; width:auto; padding:5px 12px; font-size:12px;">수정</button>
                            <button onclick="deleteDiary('${id}')" style="background:#ff7675; width:auto; padding:5px 12px; font-size:12px;">삭제</button>
                        </div>
                    </div>
                </div>
            `;
            list.appendChild(item);
        });
    }

    // 수정 모드 시작
    window.startEdit = (id, oldContent, oldCat) => {
        event.stopPropagation();
        const container = document.getElementById(`text-container-${id}`);
        
        // 카테고리 선택 옵션 생성
        let catOptions = `<option value="미분류" ${oldCat === '미분류' ? 'selected' : ''}>미분류</option>`;
        userCategories.forEach(([cid, cat]) => {
            catOptions += `<option value="${cat.name}" ${oldCat === cat.name ? 'selected' : ''}>${cat.name}</option>`;
        });

        container.innerHTML = `
            <select id="edit-cat-${id}" class="edit-select">${catOptions}</select>
            <textarea id="edit-input-${id}" class="edit-textarea">${oldContent}</textarea>
            <div style="display:flex; gap:5px;">
                <button onclick="finishEdit('${id}', \`${oldContent.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`, '${oldCat}')" style="background:#2ecc71; padding:5px 15px;">저장</button>
                <button onclick="cancelEdit()" style="background:#95a5a6; padding:5px 15px;">취소</button>
            </div>
        `;
        
        const editInput = document.getElementById(`edit-input-${id}`);
        autoResize(editInput);
        editInput.addEventListener('input', () => autoResize(editInput));
        // 수정 창 안에서의 클릭이 부모로 전파되어 창이 닫히는 것 방지
        container.querySelectorAll('textarea, select, button').forEach(el => {
            el.onclick = (e) => e.stopPropagation();
        });
    };

    window.cancelEdit = () => { event.stopPropagation(); renderUI(); };

    window.finishEdit = async (id, oldContent, oldCat) => {
        event.stopPropagation();
        const newContent = document.getElementById(`edit-input-${id}`).value;
        const newCat = document.getElementById(`edit-cat-${id}`).value;
        
        if(!newContent) return alert("내용을 입력하세요.");
        
        // 변경 사항이 있는 경우만 업데이트
        if(newContent === oldContent && newCat === oldCat) {
            renderUI();
            return;
        }

        await update(ref(db, `users/${auth.currentUser.uid}/diaries/${id}`), { 
            content: newContent,
            category: newCat
        });
    };

    window.deleteDiary = async (id) => {
        event.stopPropagation();
        if(confirm("정말 삭제할까요?")) await remove(ref(db, `users/${auth.currentUser.uid}/diaries/${id}`));
    };

    // 인증 로직 (기존과 동일)
    window.toggleAuth = (s) => { 
        document.getElementById('login-form').classList.toggle('hidden', s); 
        document.getElementById('signup-form').classList.toggle('hidden', !s); 
    };
    window.loginWithGoogle = () => signInWithPopup(auth, provider);
    window.logout = () => signOut(auth);
    window.signInWithId = async () => {
        const id = document.getElementById('login-id').value;
        const pw = document.getElementById('login-pw').value;
        const snap = await get(child(ref(db), `idMap/${id}`));
        if(snap.exists()) await signInWithEmailAndPassword(auth, snap.val().email, pw);
        else alert("아이디를 확인해주세요.");
    };
    window.signUpWithIdAndEmail = async () => {
        const nick = document.getElementById('signup-nickname').value;
        const id = document.getElementById('signup-id').value;
        const email = document.getElementById('signup-email').value;
        const pw = document.getElementById('signup-pw').value;
        const pwConfirm = document.getElementById('signup-pw-confirm').value;
        if(pw !== pwConfirm) return alert("비밀번호 불일치");
        try {
            const userCred = await createUserWithEmailAndPassword(auth, email, pw);
            await updateProfile(userCred.user, { displayName: nick });
            await set(ref(db, `idMap/${id}`), { email });
            location.reload();
        } catch (e) { alert(e.message); }
    };

    document.getElementById('date-input').value = new Date().toISOString().substring(0, 10);
</script>
</body>
</html>
