<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 비밀 일기장</title>
    <style>
        :root { --primary-color: #4a90e2; --bg-color: #f5f7fa; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 600px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        .user-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px; background: #eee; border-radius: 8px; }
        input, textarea, button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background-color: var(--primary-color); color: white; border: none; cursor: pointer; font-weight: bold; }
        .secondary-btn { background-color: #2ecc71; }
        .logout-btn { background-color: #e74c3c; width: auto; padding: 5px 10px; font-size: 12px; }
        .switch-link { text-align: center; margin-top: 15px; font-size: 14px; color: #666; cursor: pointer; text-decoration: underline; }
        .diary-item { border: 1px solid #eee; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .diary-date { font-weight: bold; color: var(--primary-color); margin-bottom: 8px; }
        .diary-img { width: 100%; border-radius: 8px; margin: 10px 0; }
        .diary-content { white-space: pre-wrap; line-height: 1.6; }
        #auth-error { color: #e74c3c; font-size: 13px; margin-top: 10px; text-align: center; min-height: 18px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔒 비밀 일기장</h1>

    <div id="auth-section">
        <div id="login-form">
            <h3 style="text-align: center;">로그인</h3>
            <input type="text" id="login-id" placeholder="아이디">
            <input type="password" id="login-pw" placeholder="비밀번호">
            <button onclick="signInWithId()">로그인</button>
            <div class="switch-link" style="margin-bottom: 5px;" onclick="sendResetEmail()">비밀번호를 잊으셨나요?</div>
            <div class="switch-link" onclick="toggleAuth(true)">계정이 없으신가요? 회원가입</div>
        </div>

        <div id="signup-form" class="hidden">
            <h3 style="text-align: center;">회원가입</h3>
            <input type="text" id="signup-nickname" placeholder="사용할 닉네임">
            <input type="text" id="signup-id" placeholder="사용할 아이디">
            <input type="email" id="signup-email" placeholder="실제 이메일 (비밀번호 재설정용)">
            <input type="password" id="signup-pw" placeholder="비밀번호 (6자리 이상)">
            <input type="password" id="signup-pw-confirm" placeholder="비밀번호 확인">
            <button class="secondary-btn" onclick="signUpWithIdAndEmail()">가입하기</button>
            <div class="switch-link" onclick="toggleAuth(false)">이미 계정이 있나요? 로그인</div>
        </div>

        <p id="auth-error"></p>
        <div style="text-align: center; margin: 15px 0; color: #888;">또는</div>
        <button onclick="login()" style="background-color: #df4a32;">구글로 계속하기</button>
    </div>

    <div id="main-section" class="hidden">
        <div class="user-info">
            <span id="user-name"></span>님 환영합니다!
            <button class="logout-btn" onclick="logout()">로그아웃</button>
        </div>

        <input type="date" id="date-input">
        <div style="margin-top: 10px; font-size: 14px;">📷 사진 추가:</div>
        <input type="file" id="image-input" accept="image/*" style="border: none; padding: 5px 0;">
        <textarea id="content-input" placeholder="오늘의 생각을 기록하세요."></textarea>
        <button id="save-btn" onclick="saveDiary()">기록하기</button>

        <hr style="margin: 30px 0; border: 0.5px solid #eee;">
        <div id="diary-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, push, onValue, get, child, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCTChi4-r43pV9MkgXat6WJjyWqJaElMIM",
        authDomain: "personal-dairy-ec00f.firebaseapp.com",
        databaseURL: "https://personal-dairy-ec00f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "personal-dairy-ec00f",
        storageBucket: "personal-dairy-ec00f.firebasestorage.app",
        messagingSenderId: "261757215946",
        appId: "1:261757215946:web:d1af5573d78b2470450033"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const storage = getStorage(app);
    const provider = new GoogleAuthProvider();

    window.toggleAuth = (showSignup) => {
        document.getElementById('login-form').classList.toggle('hidden', showSignup);
        document.getElementById('signup-form').classList.toggle('hidden', !showSignup);
        document.getElementById('auth-error').innerText = "";
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-section').classList.remove('hidden');
            document.getElementById('user-name').innerText = user.displayName || "사용자";
            loadDiaries(user.uid);
        } else {
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('main-section').classList.add('hidden');
        }
    });

    // 회원가입: 아이디-이메일 매핑 정보를 DB에 저장
    window.signUpWithIdAndEmail = async () => {
        const nickname = document.getElementById('signup-nickname').value;
        const id = document.getElementById('signup-id').value;
        const email = document.getElementById('signup-email').value;
        const password = document.getElementById('signup-pw').value;
        const passwordConfirm = document.getElementById('signup-pw-confirm').value;
        const errorElement = document.getElementById('auth-error');

        if (!nickname || !id || !email) { errorElement.innerText = "모든 정보를 입력해 주세요."; return; }
        if (password !== passwordConfirm) { errorElement.innerText = "비밀번호가 일치하지 않습니다."; return; }

        try {
            // 1. 아이디 중복 체크
            const idCheck = await get(child(ref(db), `idMap/${id}`));
            if (idCheck.exists()) {
                errorElement.innerText = "이미 사용 중인 아이디입니다.";
                return;
            }

            // 2. 가입 진행
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            // 3. 닉네임 업데이트 및 DB에 아이디 매핑 저장
            await updateProfile(user, { displayName: nickname });
            await set(ref(db, `idMap/${id}`), { email: email });
            
            alert("회원가입 성공!");
            location.reload();
        } catch (error) {
            errorElement.innerText = "가입 실패: " + error.message;
        }
    };

    // 로그인: 입력한 아이디로 이메일을 찾아와서 로그인 진행
    window.signInWithId = async () => {
        const id = document.getElementById('login-id').value;
        const password = document.getElementById('login-pw').value;
        const errorElement = document.getElementById('auth-error');

        if (!id || !password) { errorElement.innerText = "아이디와 비밀번호를 입력해 주세요."; return; }

        try {
            const snapshot = await get(child(ref(db), `idMap/${id}`));
            if (!snapshot.exists()) {
                errorElement.innerText = "존재하지 않는 아이디입니다.";
                return;
            }
            const actualEmail = snapshot.val().email;
            await signInWithEmailAndPassword(auth, actualEmail, password);
        } catch (error) {
            errorElement.innerText = "로그인 실패: 아이디 또는 비밀번호를 확인하세요.";
        }
    };

    // 비밀번호 재설정 메일 보내기
    window.sendResetEmail = async () => {
        const id = document.getElementById('login-id').value;
        if (!id) { alert("비밀번호를 찾으려는 아이디를 먼저 입력해 주세요."); return; }

        try {
            const snapshot = await get(child(ref(db), `idMap/${id}`));
            if (!snapshot.exists()) { alert("등록되지 않은 아이디입니다."); return; }

            const actualEmail = snapshot.val().email;
            await sendPasswordResetEmail(auth, actualEmail);
            alert(`${actualEmail}로 재설정 메일을 보냈습니다!`);
        } catch (error) {
            alert("메일 전송 실패: " + error.message);
        }
    };

    window.login = () => signInWithPopup(auth, provider);
    window.logout = () => signOut(auth);

    // 일기 저장 및 불러오기 로직은 이전과 동일하게 유지
    window.saveDiary = async () => {
        const date = document.getElementById('date-input').value;
        const content = document.getElementById('content-input').value;
        const file = document.getElementById('image-input').files[0];
        const saveBtn = document.getElementById('save-btn');
        const user = auth.currentUser;
        if (!content || !user) return;
        saveBtn.disabled = true;
        saveBtn.innerText = "저장 중...";
        try {
            let imageUrl = "";
            if (file) {
                const fileRef = sRef(storage, `users/${user.uid}/${Date.now()}_${file.name}`);
                await uploadBytes(fileRef, file);
                imageUrl = await getDownloadURL(fileRef);
            }
            await push(ref(db, `users/${user.uid}/diaries`), { date, content, imageUrl, timestamp: Date.now() });
            document.getElementById('content-input').value = '';
            document.getElementById('image-input').value = '';
        } catch (e) { alert("저장 실패"); } finally { saveBtn.disabled = false; saveBtn.innerText = "기록하기"; }
    };

    function loadDiaries(uid) {
        onValue(ref(db, `users/${uid}/diaries`), (snapshot) => {
            const data = snapshot.val();
            const listContainer = document.getElementById('diary-list');
            listContainer.innerHTML = '';
            if (data) {
                Object.values(data).sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(entry => {
                    const item = document.createElement('div');
                    item.className = 'diary-item';
                    const imgHtml = entry.imageUrl ? `<img src="${entry.imageUrl}" class="diary-img">` : '';
                    item.innerHTML = `<div class="diary-date">${entry.date}</div>${imgHtml}<div class="diary-content">${entry.content}</div>`;
                    listContainer.appendChild(item);
                });
            }
        });
    }
    document.getElementById('date-input').valueAsDate = new Date();
</script>
</body>
</html>
