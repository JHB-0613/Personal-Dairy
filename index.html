<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 카테고리 일기장</title>
    <style>
        :root { --primary-color: #4a90e2; --bg-color: #f5f7fa; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 700px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        
        /* 폴더 스타일 카테고리 탭 */
        .category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .folder { background: #eee; padding: 15px; border-radius: 10px; cursor: pointer; text-align: center; position: relative; transition: 0.2s; }
        .folder:hover { background: #e0e0e0; transform: translateY(-3px); }
        .folder.active { background: var(--primary-color); color: white; }
        .folder-count { position: absolute; top: 5px; left: 10px; font-size: 11px; opacity: 0.7; }

        input, textarea, button, select { width: 100%; padding: 12px; margin-top: 8px; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background-color: var(--primary-color); color: white; border: none; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { opacity: 0.9; }
        .google-btn { background-color: #df4a32; margin-top: 15px; }
        
        /* 일기 아이템 스타일 */
        .diary-item { border-bottom: 1px solid #eee; padding: 15px 0; cursor: pointer; }
        .diary-item:hover { background: #fafafa; }
        .diary-header { display: flex; justify-content: space-between; align-items: center; }
        .diary-badge { background: #eee; padding: 2px 8px; border-radius: 10px; font-size: 11px; color: #666; }
        .diary-date { font-weight: bold; font-size: 14px; color: var(--primary-color); }
        
        /* 미리보기 및 전체보기 */
        .diary-preview { color: #666; font-size: 14px; margin-top: 5px; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; }
        .diary-full { display: none; white-space: pre-wrap; line-height: 1.6; margin-top: 15px; padding: 15px; background: #f9f9f9; border-radius: 8px; }
        .diary-item.open .diary-full { display: block; }
        .diary-item.open .diary-preview { display: none; }
        
        .user-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px; background: #eee; border-radius: 8px; }
        .logout-btn { background-color: #e74c3c; width: auto; padding: 5px 10px; font-size: 12px; }
        #auth-error { color: #e74c3c; font-size: 13px; margin-top: 10px; text-align: center; }
        textarea { resize: none; min-height: 100px; overflow-y: hidden; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔒 비밀 폴더 일기장</h1>

    <div id="auth-section">
        <div id="login-form">
            <h3 style="text-align: center;">로그인</h3>
            <input type="text" id="login-id" placeholder="아이디">
            <input type="password" id="login-pw" placeholder="비밀번호">
            <button onclick="signInWithId()">로그인</button>
            <div style="text-align:center; margin-top:15px; font-size:14px; color:#666; cursor:pointer;" onclick="toggleAuth(true)">계정이 없으신가요? 회원가입</div>
        </div>

        <div id="signup-form" class="hidden">
            <h3 style="text-align: center;">회원가입</h3>
            <input type="text" id="signup-nickname" placeholder="닉네임">
            <input type="text" id="signup-id" placeholder="사용할 아이디">
            <input type="email" id="signup-email" placeholder="이메일 (비밀번호 찾기용)">
            <input type="password" id="signup-pw" placeholder="비밀번호 (6자리 이상)">
            <input type="password" id="signup-pw-confirm" placeholder="비밀번호 확인">
            <button style="background-color: #2ecc71;" onclick="signUpWithIdAndEmail()">가입하기</button>
            <div style="text-align:center; margin-top:15px; font-size:14px; color:#666; cursor:pointer;" onclick="toggleAuth(false)">이미 계정이 있나요? 로그인</div>
        </div>
        
        <p id="auth-error"></p>
        <div style="text-align: center; margin: 15px 0; color: #888;">또는</div>
        <button class="google-btn" onclick="loginWithGoogle()">구글로 계속하기</button>
    </div>

    <div id="main-section" class="hidden">
        <div class="user-info">
            <span id="user-name"></span>님 환영합니다!
            <button class="logout-btn" onclick="logout()">로그아웃</button>
        </div>

        <div class="category-grid" id="folder-grid">
            </div>

        <h3>✍️ 일기 작성</h3>
        <select id="category-select">
            <option value="과제">과제</option>
            <option value="정리">정리</option>
            <option value="메모">메모</option>
            <option value="그림">그림</option>
            <option value="봉인">봉인</option>
            <option value="꺼진 화면 메모">꺼진 화면 메모</option>
        </select>
        <input type="date" id="date-input">
        <textarea id="content-input" placeholder="내용을 입력하세요..."></textarea>
        <button id="save-btn" onclick="saveDiary()">기록하기</button>

        <hr style="margin: 30px 0; border: 0.5px solid #eee;">
        <div id="diary-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, push, onValue, get, child, set, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCTChi4-r43pV9MkgXat6WJjyWqJaElMIM",
        authDomain: "personal-dairy-ec00f.firebaseapp.com",
        databaseURL: "https://personal-dairy-ec00f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "personal-dairy-ec00f",
        storageBucket: "personal-dairy-ec00f.firebasestorage.app",
        messagingSenderId: "261757215946",
        appId: "1:261757215946:web:d1af5573d78b2470450033"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    let allDiaries = {};
    let currentFilter = "전체";
    const categories = ["과제", "정리", "메모", "그림", "봉인", "꺼진 화면 메모"];

    // 텍스트 영역 높이 자동 조절
    const contentInput = document.getElementById('content-input');
    contentInput.addEventListener('input', () => {
        contentInput.style.height = 'auto';
        contentInput.style.height = contentInput.scrollHeight + 'px';
    });

    onAuthStateChanged(auth, (user) => {
        const authSection = document.getElementById('auth-section');
        const mainSection = document.getElementById('main-section');
        if (user) {
            authSection.classList.add('hidden');
            mainSection.classList.remove('hidden');
            document.getElementById('user-name').innerText = user.displayName || user.email;
            loadDiaries(user.uid);
        } else {
            authSection.classList.remove('hidden');
            mainSection.classList.add('hidden');
        }
    });

    window.saveDiary = async () => {
        const cat = document.getElementById('category-select').value;
        const date = document.getElementById('date-input').value;
        const content = contentInput.value;
        if(!content || !auth.currentUser) return;

        await push(ref(db, `users/${auth.currentUser.uid}/diaries`), {
            category: cat,
            date: date,
            content: content,
            timestamp: Date.now()
        });
        contentInput.value = '';
        contentInput.style.height = 'auto';
    };

    function loadDiaries(uid) {
        onValue(ref(db, `users/${uid}/diaries`), (snapshot) => {
            allDiaries = snapshot.val() || {};
            renderUI();
        });
    }

    function renderUI() {
        renderFolders();
        renderList();
    }

    function renderFolders() {
        const grid = document.getElementById('folder-grid');
        grid.innerHTML = `<div class="folder ${currentFilter === '전체' ? 'active' : ''}" onclick="setFilter('전체')">전체</div>`;
        
        categories.forEach(cat => {
            const count = Object.values(allDiaries).filter(d => d.category === cat).length;
            const folder = document.createElement('div');
            folder.className = `folder ${currentFilter === cat ? 'active' : ''}`;
            folder.onclick = () => setFilter(cat);
            folder.innerHTML = `<span class="folder-count">${count}</span>${cat}`;
            grid.appendChild(folder);
        });
    }

    window.setFilter = (cat) => {
        currentFilter = cat;
        renderUI();
    };

    function renderList() {
        const list = document.getElementById('diary-list');
        list.innerHTML = '';
        let entries = Object.entries(allDiaries);
        
        if(currentFilter !== "전체") {
            entries = entries.filter(([id, d]) => d.category === currentFilter);
        }

        entries.sort((a, b) => b[1].timestamp - a[1].timestamp).forEach(([id, d]) => {
            const item = document.createElement('div');
            item.className = 'diary-item';
            item.onclick = () => item.classList.toggle('open');
            item.innerHTML = `
                <div class="diary-header">
                    <span class="diary-date">${d.date}</span>
                    <span class="diary-badge">${d.category}</span>
                </div>
                <div class="diary-preview">${d.content}</div>
                <div class="diary-full">
                    ${d.content}
                    <div style="margin-top:15px; text-align:right; display:flex; gap:5px; justify-content: flex-end;">
                        <button onclick="deleteDiary('${id}')" style="background:#ff7675; width:auto; padding:5px 10px; font-size:12px;">삭제</button>
                    </div>
                </div>
            `;
            list.appendChild(item);
        });
    }

    window.deleteDiary = async (id) => {
        event.stopPropagation();
        if(confirm("정말 삭제할까요?")) {
            await remove(ref(db, `users/${auth.currentUser.uid}/diaries/${id}`));
        }
    };

    // 인증 관련 함수
    window.toggleAuth = (s) => { 
        document.getElementById('login-form').classList.toggle('hidden', s); 
        document.getElementById('signup-form').classList.toggle('hidden', !s); 
        document.getElementById('auth-error').innerText = "";
    };

    window.loginWithGoogle = () => signInWithPopup(auth, provider);
    window.logout = () => signOut(auth);

    window.signInWithId = async () => {
        const id = document.getElementById('login-id').value;
        const pw = document.getElementById('login-pw').value;
        const errorElement = document.getElementById('auth-error');
        try {
            const snap = await get(child(ref(db), `idMap/${id}`));
            if(!snap.exists()) { errorElement.innerText = "존재하지 않는 아이디입니다."; return; }
            await signInWithEmailAndPassword(auth, snap.val().email, pw);
        } catch (error) { errorElement.innerText = "아이디 또는 비밀번호가 틀렸습니다."; }
    };

    window.signUpWithIdAndEmail = async () => {
        const nick = document.getElementById('signup-nickname').value;
        const id = document.getElementById('signup-id').value;
        const email = document.getElementById('signup-email').value;
        const pw = document.getElementById('signup-pw').value;
        const pwConfirm = document.getElementById('signup-pw-confirm').value;
        const errorElement = document.getElementById('auth-error');

        if(!nick || !id || !email || !pw) { errorElement.innerText = "모든 정보를 입력해 주세요."; return; }
        if(pw !== pwConfirm) { errorElement.innerText = "비밀번호가 일치하지 않습니다."; return; }

        try {
            const idCheck = await get(child(ref(db), `idMap/${id}`));
            if(idCheck.exists()) { errorElement.innerText = "이미 사용 중인 아이디입니다."; return; }
            const userCred = await createUserWithEmailAndPassword(auth, email, pw);
            await updateProfile(userCred.user, { displayName: nick });
            await set(ref(db, `idMap/${id}`), { email: email });
            location.reload();
        } catch (error) { errorElement.innerText = error.message; }
    };

    // 오늘 날짜 설정
    const dateInput = document.getElementById('date-input');
    const now = new Date();
    dateInput.value = now.toISOString().substring(0, 10);
</script>
</body>
</html>
