<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 비밀 일기장</title>
    <style>
        :root { --primary-color: #4a90e2; --bg-color: #f5f7fa; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 600px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        .user-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px; background: #eee; border-radius: 8px; }
        input, textarea, button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background-color: var(--primary-color); color: white; border: none; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { opacity: 0.9; }
        .google-btn { background-color: #df4a32; margin-top: 15px; }
        .logout-btn { background-color: #e74c3c; width: auto; padding: 5px 10px; font-size: 12px; }
        .btn-group { float: right; display: flex; gap: 5px; }
        .edit-btn { background-color: #f1c40f; width: auto; padding: 4px 8px; font-size: 11px; margin-top: 0; }
        .delete-btn { background-color: #ff7675; width: auto; padding: 4px 8px; font-size: 11px; margin-top: 0; }
        .filter-section { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-top: 20px; border: 1px dashed #ccc; }
        .diary-item { border: 1px solid #eee; padding: 15px; border-radius: 8px; margin-bottom: 15px; position: relative; overflow: hidden; }
        .diary-date { font-weight: bold; color: var(--primary-color); margin-bottom: 4px; }
        .diary-time { font-size: 12px; color: #999; margin-bottom: 8px; }
        .diary-content { white-space: pre-wrap; line-height: 1.6; clear: both; margin-top: 10px; }
        textarea { overflow-y: hidden; resize: none; min-height: 100px; }
        .edit-textarea { min-height: 80px; margin-bottom: 10px; }
        .switch-link { text-align: center; margin-top: 15px; font-size: 14px; color: #666; cursor: pointer; text-decoration: underline; }
        #auth-error { color: #e74c3c; font-size: 13px; margin-top: 10px; text-align: center; min-height: 18px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔒 비밀 일기장</h1>

    <div id="auth-section">
        <div id="login-form">
            <h3 style="text-align: center;">로그인</h3>
            <input type="text" id="login-id" placeholder="아이디">
            <input type="password" id="login-pw" placeholder="비밀번호">
            <button onclick="signInWithId()">로그인</button>
            <div class="switch-link" onclick="sendResetEmail()">비밀번호를 잊으셨나요?</div>
            <div class="switch-link" onclick="toggleAuth(true)">계정이 없으신가요? 회원가입</div>
        </div>

        <div id="signup-form" class="hidden">
            <h3 style="text-align: center;">회원가입</h3>
            <input type="text" id="signup-nickname" placeholder="사용할 닉네임">
            <input type="text" id="signup-id" placeholder="사용할 아이디">
            <input type="email" id="signup-email" placeholder="실제 이메일 (비밀번호 재설정용)">
            <input type="password" id="signup-pw" placeholder="비밀번호 (6자리 이상)">
            <input type="password" id="signup-pw-confirm" placeholder="비밀번호 확인">
            <button style="background-color: #2ecc71;" onclick="signUpWithIdAndEmail()">가입하기</button>
            <div class="switch-link" onclick="toggleAuth(false)">이미 계정이 있나요? 로그인</div>
        </div>
        <p id="auth-error"></p>
        <div style="text-align: center; margin: 15px 0; color: #888;">또는</div>
        <button class="google-btn" onclick="loginWithGoogle()">구글로 계속하기</button>
    </div>

    <div id="main-section" class="hidden">
        <div class="user-info">
            <span id="user-name"></span>님 환영합니다!
            <button class="logout-btn" onclick="logout()">로그아웃</button>
        </div>

        <h3>✍️ 오늘 일기 쓰기</h3>
        <input type="date" id="date-input">
        <textarea id="content-input" placeholder="오늘의 생각을 기록하세요."></textarea>
        <button id="save-btn" onclick="saveDiary()">기록하기</button>

        <div class="filter-section">
            <h4 style="margin-top:0;">📅 날짜로 일기 찾기</h4>
            <input type="date" id="filter-date" onchange="filterDiaries()">
            <button onclick="resetFilter()" style="background-color: #95a5a6; margin-top: 5px;">모든 일기 보기</button>
        </div>

        <hr style="margin: 30px 0; border: 0.5px solid #eee;">
        <div id="diary-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, push, onValue, get, child, set, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCTChi4-r43pV9MkgXat6WJjyWqJaElMIM",
        authDomain: "personal-dairy-ec00f.firebaseapp.com",
        databaseURL: "https://personal-dairy-ec00f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "personal-dairy-ec00f",
        storageBucket: "personal-dairy-ec00f.firebasestorage.app",
        messagingSenderId: "261757215946",
        appId: "1:261757215946:web:d1af5573d78b2470450033"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    let allDiaries = {};

    const autoResize = (textarea) => {
        textarea.style.height = 'auto';
        textarea.style.height = textarea.scrollHeight + 'px';
    };

    const contentInput = document.getElementById('content-input');
    contentInput.addEventListener('input', () => autoResize(contentInput));

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-section').classList.remove('hidden');
            document.getElementById('user-name').innerText = user.displayName || user.email;
            loadDiaries(user.uid);
        } else {
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('main-section').classList.add('hidden');
        }
    });

    window.saveDiary = async () => {
        const date = document.getElementById('date-input').value;
        const content = contentInput.value;
        if (!content || !auth.currentUser) return;
        const now = new Date();
        await push(ref(db, `users/${auth.currentUser.uid}/diaries`), {
            date,
            content,
            time: now.toLocaleTimeString('ko-KR'),
            timestamp: Date.now()
        });
        contentInput.value = '';
        contentInput.style.height = 'auto';
    };

    window.editDiary = (diaryId, currentContent) => {
        const contentDiv = document.getElementById(`content-${diaryId}`);
        contentDiv.innerHTML = `
            <textarea id="edit-input-${diaryId}" class="edit-textarea">${currentContent}</textarea>
            <div style="display:flex; gap:5px;">
                <button onclick="updateDiary('${diaryId}', \`${currentContent.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)" style="background-color:#2ecc71; width:auto; padding:5px 15px;">저장</button>
                <button onclick="cancelEdit()" style="background-color:#95a5a6; width:auto; padding:5px 15px;">취소</button>
            </div>
        `;
        
        const editInput = document.getElementById(`edit-input-${diaryId}`);
        autoResize(editInput);
        editInput.addEventListener('input', () => autoResize(editInput));
    };

    window.cancelEdit = () => {
        renderDiaries(allDiaries, document.getElementById('filter-date').value);
    };

    // [개선] 기존 내용(oldContent)과 비교하는 로직 추가
    window.updateDiary = async (diaryId, oldContent) => {
        const newContent = document.getElementById(`edit-input-${diaryId}`).value;
        
        if (!newContent) return alert("내용을 입력해주세요.");

        // 기존 내용과 바뀐 내용이 같으면 서버 통신 없이 취소 처리
        if (newContent === oldContent) {
            cancelEdit();
            return;
        }
        
        try {
            await update(ref(db, `users/${auth.currentUser.uid}/diaries/${diaryId}`), { content: newContent });
        } catch (e) { alert("수정 실패"); }
    };

    window.deleteDiary = async (diaryId) => {
        if (!confirm("정말 삭제할까요?")) return;
        await remove(ref(db, `users/${auth.currentUser.uid}/diaries/${diaryId}`));
    };

    function loadDiaries(uid) {
        onValue(ref(db, `users/${uid}/diaries`), (snapshot) => {
            allDiaries = snapshot.val() || {};
            renderDiaries(allDiaries, document.getElementById('filter-date').value);
        });
    }

    function renderDiaries(data, filterDate = "") {
        const list = document.getElementById('diary-list');
        list.innerHTML = '';
        let entries = Object.entries(data);
        if (filterDate) entries = entries.filter(([id, e]) => e.date === filterDate);
        
        entries.sort((a, b) => b[1].timestamp - a[1].timestamp).forEach(([id, entry]) => {
            const item = document.createElement('div');
            item.className = 'diary-item';
            // 수정 시 역따옴표(`)와 달러 기호($)가 포함된 텍스트 에러를 방지하기 위해 이스케이프 처리
            const safeContent = entry.content.replace(/`/g, '\\`').replace(/\$/g, '\\$');
            item.innerHTML = `
                <div class="btn-group">
                    <button class="edit-btn" onclick="editDiary('${id}', \`${safeContent}\`)">수정</button>
                    <button class="delete-btn" onclick="deleteDiary('${id}')">삭제</button>
                </div>
                <div class="diary-date">${entry.date}</div>
                <div class="diary-time">🕒 작성 시간: ${entry.time || ''}</div>
                <div id="content-${id}" class="diary-content">${entry.content}</div>
            `;
            list.appendChild(item);
        });
    }

    window.toggleAuth = (s) => { document.getElementById('login-form').classList.toggle('hidden', s); document.getElementById('signup-form').classList.toggle('hidden', !s); };
    window.filterDiaries = () => renderDiaries(allDiaries, document.getElementById('filter-date').value);
    window.resetFilter = () => { document.getElementById('filter-date').value = ''; renderDiaries(allDiaries); };
    window.loginWithGoogle = () => signInWithPopup(auth, provider);
    window.logout = () => signOut(auth);
    window.signInWithId = async () => {
        const id = document.getElementById('login-id').value;
        const password = document.getElementById('login-pw').value;
        try {
            const snapshot = await get(child(ref(db), `idMap/${id}`));
            if (!snapshot.exists()) { alert("존재하지 않는 아이디입니다."); return; }
            await signInWithEmailAndPassword(auth, snapshot.val().email, password);
        } catch (error) { alert("로그인 실패"); }
    };
    window.signUpWithIdAndEmail = async () => {
        const nickname = document.getElementById('signup-nickname').value;
        const id = document.getElementById('signup-id').value;
        const email = document.getElementById('signup-email').value;
        const password = document.getElementById('signup-pw').value;
        const passwordConfirm = document.getElementById('signup-pw-confirm').value;
        if (!nickname || !id || !email) return alert("정보 부족");
        if (password !== passwordConfirm) return alert("비밀번호 불일치");
        try {
            const idCheck = await get(child(ref(db), `idMap/${id}`));
            if (idCheck.exists()) return alert("중복 아이디");
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            await updateProfile(userCredential.user, { displayName: nickname });
            await set(ref(db, `idMap/${id}`), { email: email });
            location.reload();
        } catch (error) { alert(error.message); }
    };
    window.sendResetEmail = async () => {
        const id = prompt("아이디를 입력하세요.");
        if (!id) return;
        const snap = await get(child(ref(db), `idMap/${id}`));
        if (snap.exists()) { await sendPasswordResetEmail(auth, snap.val().email); alert("메일을 보냈습니다."); }
    };
    document.getElementById('date-input').valueAsDate = new Date();
</script>
</body>
</html>
