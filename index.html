<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 비밀 일기장</title>
    <style>
        :root { --primary-color: #4a90e2; --bg-color: #f5f7fa; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 600px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        .user-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px; background: #eee; border-radius: 8px; }
        input, textarea, button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background-color: var(--primary-color); color: white; border: none; cursor: pointer; font-weight: bold; }
        .logout-btn { background-color: #e74c3c; width: auto; padding: 5px 10px; font-size: 12px; }
        .delete-btn { background-color: #ff7675; width: auto; padding: 4px 8px; font-size: 11px; float: right; margin-top: 0; }
        .diary-item { border: 1px solid #eee; padding: 15px; border-radius: 8px; margin-bottom: 15px; position: relative; overflow: hidden; }
        .diary-date { font-weight: bold; color: var(--primary-color); margin-bottom: 4px; }
        .diary-time { font-size: 12px; color: #999; margin-bottom: 8px; }
        .diary-img { width: 100%; border-radius: 8px; margin: 10px 0; }
        .diary-content { white-space: pre-wrap; line-height: 1.6; clear: both; }
        #auth-error { color: #e74c3c; font-size: 13px; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔒 비밀 일기장</h1>

    <div id="auth-section">
        <div id="login-form">
            <h3 style="text-align: center;">로그인</h3>
            <input type="text" id="login-id" placeholder="아이디">
            <input type="password" id="login-pw" placeholder="비밀번호">
            <button onclick="signInWithId()">로그인</button>
            <div class="switch-link" style="text-align:center; cursor:pointer; margin-top:10px;" onclick="sendResetEmail()">비밀번호를 잊으셨나요?</div>
            <div class="switch-link" style="text-align:center; cursor:pointer; margin-top:10px;" onclick="toggleAuth(true)">계정이 없으신가요? 회원가입</div>
        </div>

        <div id="signup-form" class="hidden">
            <h3 style="text-align: center;">회원가입</h3>
            <input type="text" id="signup-nickname" placeholder="사용할 닉네임">
            <input type="text" id="signup-id" placeholder="사용할 아이디">
            <input type="email" id="signup-email" placeholder="실제 이메일 (비밀번호 재설정용)">
            <input type="password" id="signup-pw" placeholder="비밀번호 (6자리 이상)">
            <input type="password" id="signup-pw-confirm" placeholder="비밀번호 확인">
            <button onclick="signUpWithIdAndEmail()" style="background-color: #2ecc71;">가입하기</button>
            <div class="switch-link" style="text-align:center; cursor:pointer; margin-top:10px;" onclick="toggleAuth(false)">이미 계정이 있나요? 로그인</div>
        </div>
        <p id="auth-error"></p>
    </div>

    <div id="main-section" class="hidden">
        <div class="user-info">
            <span id="user-name"></span>님 환영합니다!
            <button class="logout-btn" onclick="logout()">로그아웃</button>
        </div>
        <input type="date" id="date-input">
        <div style="margin-top: 10px; font-size: 14px;">📷 사진 추가 (동영상 불가):</div>
        <input type="file" id="image-input" accept="image/*">
        <textarea id="content-input" placeholder="오늘의 생각을 기록하세요."></textarea>
        <button id="save-btn" onclick="saveDiary()">기록하기</button>
        <hr style="margin: 30px 0; border: 0.5px solid #eee;">
        <div id="diary-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, push, onValue, get, child, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getStorage, ref as sRef, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCTChi4-r43pV9MkgXat6WJjyWqJaElMIM",
        authDomain: "personal-dairy-ec00f.firebaseapp.com",
        databaseURL: "https://personal-dairy-ec00f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "personal-dairy-ec00f",
        storageBucket: "personal-dairy-ec00f.firebasestorage.app",
        messagingSenderId: "261757215946",
        appId: "1:261757215946:web:d1af5573d78b2470450033"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const storage = getStorage(app);

    // [기능 1] 동영상 파일 선택 시 경고
    document.getElementById('image-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file && file.type.startsWith('video/')) {
            alert("동영상 파일은 업로드할 수 없습니다. 이미지만 선택해 주세요!");
            e.target.value = ""; // 선택 초기화
        }
    });

    // 인증 관련 함수들
    window.toggleAuth = (showSignup) => {
        document.getElementById('login-form').classList.toggle('hidden', showSignup);
        document.getElementById('signup-form').classList.toggle('hidden', !showSignup);
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-section').classList.remove('hidden');
            document.getElementById('user-name').innerText = user.displayName || "사용자";
            loadDiaries(user.uid);
        } else {
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('main-section').classList.add('hidden');
        }
    });

    window.signUpWithIdAndEmail = async () => {
        const nick = document.getElementById('signup-nickname').value;
        const id = document.getElementById('signup-id').value;
        const email = document.getElementById('signup-email').value;
        const pw = document.getElementById('signup-pw').value;
        if (pw !== document.getElementById('signup-pw-confirm').value) return alert("비밀번호 불일치");
        try {
            const userCred = await createUserWithEmailAndPassword(auth, email, pw);
            await updateProfile(userCred.user, { displayName: nick });
            await set(ref(db, `idMap/${id}`), { email: email });
            location.reload();
        } catch (e) { alert(e.message); }
    };

    window.signInWithId = async () => {
        const id = document.getElementById('login-id').value;
        const pw = document.getElementById('login-pw').value;
        try {
            const snap = await get(child(ref(db), `idMap/${id}`));
            if (snap.exists()) await signInWithEmailAndPassword(auth, snap.val().email, pw);
            else alert("아이디 없음");
        } catch (e) { alert("로그인 실패"); }
    };

    window.logout = () => signOut(auth);

    // [기능 2, 3] 일기 저장 (시간 포함)
    window.saveDiary = async () => {
        const date = document.getElementById('date-input').value;
        const content = document.getElementById('content-input').value;
        const file = document.getElementById('image-input').files[0];
        const saveBtn = document.getElementById('save-btn');
        if (!content || !auth.currentUser) return;

        saveBtn.disabled = true;
        saveBtn.innerText = "저장 중...";

        try {
            let imageUrl = "";
            let imagePath = ""; // 삭제를 위해 경로 저장
            if (file) {
                imagePath = `users/${auth.currentUser.uid}/${Date.now()}_${file.name}`;
                const fileRef = sRef(storage, imagePath);
                await uploadBytes(fileRef, file);
                imageUrl = await getDownloadURL(fileRef);
            }

            const now = new Date();
            const timeString = now.toLocaleTimeString('ko-KR'); // [시간 표시용]

            await push(ref(db, `users/${auth.currentUser.uid}/diaries`), {
                date,
                content,
                imageUrl,
                imagePath,
                time: timeString, // 시간 저장
                timestamp: Date.now()
            });
            document.getElementById('content-input').value = '';
            document.getElementById('image-input').value = '';
        } catch (e) { alert("실패"); } finally {
            saveBtn.disabled = false;
            saveBtn.innerText = "기록하기";
        }
    };

    // [기능 2] 일기 삭제 함수
    window.deleteDiary = async (diaryId, imagePath) => {
        if (!confirm("정말 이 일기를 삭제할까요?")) return;
        try {
            // 1. 이미지 삭제 (있을 경우)
            if (imagePath) {
                await deleteObject(sRef(storage, imagePath));
            }
            // 2. 데이터베이스 삭제
            await remove(ref(db, `users/${auth.currentUser.uid}/diaries/${diaryId}`));
        } catch (e) { alert("삭제 실패"); }
    };

    function loadDiaries(uid) {
        onValue(ref(db, `users/${uid}/diaries`), (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('diary-list');
            list.innerHTML = '';
            if (data) {
                // entries를 사용하여 ID값과 데이터를 함께 가져옴
                Object.entries(data).sort((a, b) => b[1].timestamp - a[1].timestamp).forEach(([id, entry]) => {
                    const item = document.createElement('div');
                    item.className = 'diary-item';
                    const imgHtml = entry.imageUrl ? `<img src="${entry.imageUrl}" class="diary-img">` : '';
                    item.innerHTML = `
                        <button class="delete-btn" onclick="deleteDiary('${id}', '${entry.imagePath || ''}')">삭제</button>
                        <div class="diary-date">${entry.date}</div>
                        <div class="diary-time">🕒 작성 시간: ${entry.time || '기록 없음'}</div>
                        ${imgHtml}
                        <div class="diary-content">${entry.content}</div>
                    `;
                    list.appendChild(item);
                });
            }
        });
    }

    document.getElementById('date-input').valueAsDate = new Date();
</script>
</body>
</html>
